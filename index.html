<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A little something for you</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff0f6;
    overflow: hidden;
  }

  .screen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 2rem; }
  .screen.active { display: flex; }

  .petal {
    position: fixed;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 0;
    font-size: 20px;
  }
  @keyframes fall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  #ask-screen { gap: 2rem; max-width: 420px; position: relative; z-index: 1; }

  .card {
    background: white;
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 40px rgba(232,67,147,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.8rem;
  }

  .hearts {
    font-size: 52px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .question {
    font-size: 22px;
    font-weight: 600;
    color: #333;
    line-height: 1.5;
  }

  .btn-area { position: relative; width: 100%; height: 56px; }

  #yes-btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 52px;
    font-size: 18px;
    font-weight: 600;
    background: #e84393;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(232,67,147,0.4);
    white-space: nowrap;
  }
  #yes-btn:hover { background: #c9307a; }
  #yes-btn:active { transform: translateX(-50%) scale(0.97); }

  #no-btn {
    position: fixed;
    padding: 10px 28px;
    font-size: 15px;
    background: white;
    color: #aaa;
    border: 1px solid #ddd;
    border-radius: 50px;
    cursor: pointer;
    z-index: 999;
    user-select: none;
  }

  #yes-screen { gap: 1.5rem; max-width: 440px; position: relative; z-index: 1; }

  .yes-card {
    background: white;
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 40px rgba(232,67,147,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    animation: fadein 0.6s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .big-heart { font-size: 80px; animation: pop 0.5s ease forwards; }
  @keyframes pop {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); }
  }

  .confirm-text {
    font-size: 24px;
    font-weight: 700;
    color: #e84393;
    line-height: 1.4;
  }
  .sub-text { font-size: 16px; color: #888; }
  .confetti-row { font-size: 30px; letter-spacing: 8px; }
</style>
</head>
<body>

<div id="ask-screen" class="screen active">
  <div class="card">
    <div class="hearts">&#10084;&#65039;</div>
    <p class="question">Hey there, will you go on a date with me?</p>
    <div class="btn-area">
      <button id="yes-btn" onclick="sayYes()">Yes &#128157;</button>
    </div>
  </div>
</div>

<button id="no-btn" onmouseenter="floatAway()" ontouchstart="floatAway(event)">No</button>

<div id="yes-screen" class="screen">
  <div class="yes-card">
    <div class="big-heart">&#10084;&#65039;</div>
    <p class="confirm-text">Priyank is looking forward to seeing you!</p>
    <p class="sub-text">Get ready for something special &#10024;</p>
    <p class="confetti-row">&#127881;&#127801;&#128150;&#127881;</p>
  </div>
</div>

<script>
  (function() {
    var petals = ['&#10024;','&#128144;','&#128149;','&#127801;','&#128148;'];
    for (var i = 0; i < 16; i++) {
      var p = document.createElement('div');
      p.className = 'petal';
      p.innerHTML = petals[Math.floor(Math.random() * petals.length)];
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.fontSize = (12 + Math.random() * 14) + 'px';
      document.body.appendChild(p);
    }

    var noBtn = document.getElementById('no-btn');
    var noX = window.innerWidth / 2 + 90;
    var noY = window.innerHeight / 2 + 70;

    function placeNo() {
      noBtn.style.left = noX + 'px';
      noBtn.style.top  = noY + 'px';
    }
    placeNo();

    window.floatAway = function(e) {
      if (e) e.preventDefault();
      var margin = 60;
      var bw = noBtn.offsetWidth || 90;
      var bh = noBtn.offsetHeight || 42;
      var nx, ny, tries = 0;
      do {
        nx = margin + Math.random() * (window.innerWidth  - bw - 2 * margin);
        ny = margin + Math.random() * (window.innerHeight - bh - 2 * margin);
        tries++;
      } while (Math.abs(nx - noX) < 140 && Math.abs(ny - noY) < 90 && tries < 20);
      noX = nx; noY = ny;
      placeNo();
    };

    window.sayYes = function() {
      document.getElementById('ask-screen').classList.remove('active');
      noBtn.style.display = 'none';
      document.getElementById('yes-screen').classList.add('active');
    };
  })();
</script>
</body>
</html>
