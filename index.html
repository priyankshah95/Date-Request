<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A little something for you 💕</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fff0f6 0%, #fce4ec 50%, #fff0f6 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .screen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 2rem; }
  .screen.active { display: flex; }

  /* Floating petals */
  .petal {
    position: fixed;
    font-size: 18px;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes fall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* Ask screen */
  #ask-screen { gap: 2rem; max-width: 420px; position: relative; z-index: 1; }

  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 40px rgba(232,67,147,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.8rem;
  }

  .hearts {
    font-size: 52px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .question {
    font-size: 24px;
    font-weight: 600;
    color: #333;
    line-height: 1.4;
  }

  .btn-area { position: relative; width: 280px; height: 56px; }

  #yes-btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 52px;
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, #e84393, #f06292);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(232,67,147,0.4);
    transition: transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
  }
  #yes-btn:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 0 6px 24px rgba(232,67,147,0.5);
  }
  #yes-btn:active { transform: translateX(-50%) scale(0.97); }

  #no-btn {
    position: fixed;
    padding: 10px 28px;
    font-size: 15px;
    font-weight: 400;
    background: rgba(255,255,255,0.7);
    color: #999;
    border: 1px solid #ddd;
    border-radius: 50px;
    cursor: pointer;
    z-index: 999;
    transition: none;
    user-select: none;
  }

  /* Yes screen */
  #yes-screen {
    gap: 1.5rem;
    max-width: 440px;
    position: relative;
    z-index: 1;
    animation: fadein 0.6s ease;
  }
  @keyframes fadein { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .yes-card {
    background: rgba(255,255,255,0.9);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 40px rgba(232,67,147,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }

  .big-heart { font-size: 80px; animation: pop 0.5s ease forwards; }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); }
  }

  .confirm-text {
    font-size: 26px;
    font-weight: 700;
    color: #e84393;
    line-height: 1.4;
  }
  .sub-text { font-size: 16px; color: #888; }
  .confetti-row { font-size: 30px; letter-spacing: 8px; }
</style>
</head>
<body>

<!-- Floating petals -->
<script>
  const emojis = ['🌸','💕','✨','🌹','💖','🦋'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.fontSize = (12 + Math.random() * 16) + 'px';
    document.body.appendChild(p);
  }
</script>

<!-- Ask screen -->
<div id="ask-screen" class="screen active">
  <div class="card">
    <div class="hearts">❤️</div>
    <p class="question">Hey there, will you go on a date with me?</p>
    <div class="btn-area">
      <button id="yes-btn" onclick="sayYes()">Yes 💝</button>
    </div>
  </div>
</div>

<button id="no-btn" onmouseenter="floatAway()" ontouchstart="floatAway()">No</button>

<!-- Yes screen -->
<div id="yes-screen" class="screen">
  <div class="yes-card">
    <div class="big-heart">❤️</div>
    <p class="confirm-text">Priyank is looking forward to seeing you!</p>
    <p class="sub-text">Get ready for something special ✨</p>
    <p class="confetti-row">🎉🌹💖🎉</p>
  </div>
</div>

<script>
  const noBtn = document.getElementById('no-btn');
  let noX = window.innerWidth / 2 + 80;
  let noY = window.innerHeight / 2 + 60;

  function placeNo() {
    noBtn.style.left = noX + 'px';
    noBtn.style.top  = noY + 'px';
  }
  placeNo();

  function floatAway() {
    const margin = 60;
    const bw = noBtn.offsetWidth || 90;
    const bh = noBtn.offsetHeight || 42;
    let nx, ny, tries = 0;
    do {
      nx = margin + Math.random() * (window.innerWidth  - bw - 2 * margin);
      ny = margin + Math.random() * (window.innerHeight - bh - 2 * margin);
      tries++;
    } while (Math.abs(nx - noX) < 130 && Math.abs(ny - noY) < 90 && tries < 20);
    noX = nx; noY = ny;
    placeNo();
  }

  function sayYes() {
    document.getElementById('ask-screen').classList.remove('active');
    noBtn.style.display = 'none';
    document.getElementById('yes-screen').classList.add('active');
  }
</script>
</body>
</html>
